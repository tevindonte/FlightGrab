            --max-jobs-per-run $MAX_JOBS_PER_RUN \
            --worker-id 2 \
            --total-workers $TOTAL_WORKERS \
            --concurrency 2

  scrape-full-3:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.worker == 'all' || github.event.inputs.worker == '3' }}
    timeout-minutes: 35
