# Daily Flight Scraper – GitHub Actions (7 GB RAM per worker, FREE)
# Runs 4 parallel workers, each scraping ~12–13 origins
# Schedule: 3 AM UTC daily

name: Daily Flight Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker to run (1-4 or "all")'
        required: false
        default: 'all'
        type: string

jobs:
  scrape-worker-1:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.worker == 'all' || github.event.inputs.worker == '1' }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Scrape origins 1–13
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WORKER_ID: '1'
          FETCH_BOOKING_URLS: '15'
        run: python daily_scraper.py incremental

  scrape-worker-2:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.worker == 'all' || github.event.inputs.worker == '2' }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Scrape origins 14–26
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WORKER_ID: '2'
          FETCH_BOOKING_URLS: '15'
        run: python daily_scraper.py incremental

  scrape-worker-3:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.worker == 'all' || github.event.inputs.worker == '3' }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Scrape origins 27–38
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WORKER_ID: '3'
          FETCH_BOOKING_URLS: '15'
        run: python daily_scraper.py incremental

  scrape-worker-4:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.worker == 'all' || github.event.inputs.worker == '4' }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Scrape origins 39–50
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WORKER_ID: '4'
          FETCH_BOOKING_URLS: '15'
        run: python daily_scraper.py incremental

  daily-scrape-summary:
    runs-on: ubuntu-latest
    needs: [scrape-worker-1, scrape-worker-2, scrape-worker-3, scrape-worker-4]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv

      - name: Send scrape summary email
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ZOHO_SMTP_PASSWORD: ${{ secrets.ZOHO_SMTP_PASSWORD }}
          ZOHO_FROM_EMAIL: ${{ vars.ZOHO_FROM_EMAIL }}
          SCRAPE_SUMMARY_EMAIL: ${{ vars.SCRAPE_SUMMARY_EMAIL }}
        run: python send_scrape_summary.py
