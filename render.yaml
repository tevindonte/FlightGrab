# FlightGrab – Render Blueprint
# Web app only. Scraping runs via GitHub Actions (scrape-flights, scrape-full-locations).
#
# If the Dashboard "Health Check Path" was set to /api/health, deploys can fail (503 when DB is slow).
# This file uses /ping. Sync the Dashboard to /ping, or rely on /api/health default (200 + JSON).

services:
  - type: web
    name: flightgrab
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        sync: false  # Set in Dashboard: Neon PostgreSQL connection string
