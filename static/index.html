<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlightGrab - Find Cheap Flights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/images/logo.png">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo-link">
        <img src="/static/images/logo.png" alt="FlightGrab" class="logo-img">
        <span class="logo-text">FlightGrab</span>
      </a>
      <p class="tagline">Find the cheapest flights today</p>
    </div>
  </header>

  <main class="container">
    <div class="origin-selector">
      <label for="origin">Flying from:</label>
      <select id="origin" aria-label="Origin airport">
        <option value="">Loading...</option>
      </select>
    </div>

    <div class="results-header">
      <h2 id="deals-heading" class="deals-heading">Cheapest Flights This Week</h2>
      <div class="stats" id="stats" aria-live="polite">
        <span class="stat"><strong id="deal-count">0</strong> destinations</span>
        <span class="stat">Starting from <strong id="cheapest-price">—</strong></span>
        <span class="stat">Updated <strong id="last-update">—</strong></span>
      </div>
    </div>

    <div class="controls-row">
      <div class="date-picker">
        <label for="date-range">Departure dates:</label>
        <select id="date-range" aria-label="Date range">
          <option value="today">Today</option>
          <option value="tomorrow">Tomorrow</option>
          <option value="weekend">This Weekend</option>
          <option value="week" selected>This Week</option>
          <option value="month">This Month</option>
          <option value="flexible">Flexible (cheapest in 30 days)</option>
        </select>
      </div>
      <button type="button" class="mobile-filter-btn" id="mobile-filter-btn" aria-expanded="false" aria-controls="filter-drawer">
        Filters & Sort
      </button>
      <div class="controls-bar-wrapper" id="controls-bar-wrapper">
        <div class="controls-bar">
          <div class="sort-section">
            <label for="sort-select">Sort by:</label>
            <select id="sort-select" aria-label="Sort deals">
              <option value="price-asc" selected>Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="date-asc">Date: Soonest First</option>
              <option value="duration-asc">Duration: Shortest</option>
            </select>
          </div>
          <div class="filter-section">
            <label class="filter-checkbox">
              <input type="checkbox" id="filter-nonstop" aria-label="Nonstop only">
              Nonstop only
              <span class="filter-count" id="nonstop-count"></span>
            </label>
            <label>
              Max price:
              <input type="number" id="filter-max-price" placeholder="e.g. 100" min="0" aria-label="Max one-way price">
            </label>
            <button type="button" class="clear-filters-btn hidden" id="clear-filters">Clear all filters</button>
          </div>
        </div>
      </div>
      <div class="filter-drawer" id="filter-drawer" role="region" aria-label="Filters and sort options">
        <div class="controls-bar">
          <div class="sort-section">
            <label for="sort-select-mobile">Sort by:</label>
            <select id="sort-select-mobile" aria-label="Sort deals">
              <option value="price-asc" selected>Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="date-asc">Date: Soonest First</option>
              <option value="duration-asc">Duration: Shortest</option>
            </select>
          </div>
          <div class="filter-section">
            <label class="filter-checkbox">
              <input type="checkbox" id="filter-nonstop-mobile" aria-label="Nonstop only">
              Nonstop only
              <span class="filter-count" id="nonstop-count-mobile"></span>
            </label>
            <label>
              Max price:
              <input type="number" id="filter-max-price-mobile" placeholder="e.g. 100" min="0" aria-label="Max one-way price">
            </label>
            <button type="button" class="clear-filters-btn hidden" id="clear-filters-mobile">Clear all filters</button>
          </div>
        </div>
        <button type="button" class="drawer-close" id="drawer-close">Done</button>
      </div>
    </div>

    <div class="search-section">
      <input
        type="text"
        id="search-input"
        placeholder="Search airports or cities (e.g., JFK, New York, Atlanta)"
        class="search-input"
        aria-label="Search destinations"
      >
    </div>

    <div id="loading" class="skeleton-grid hidden">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
    <div id="error" class="error hidden"></div>
    <div id="no-results" class="no-results hidden">No results match your search.</div>

    <div id="deals-grid" class="deals-grid"></div>
  </main>

  <div id="return-modal" class="modal hidden" role="dialog" aria-labelledby="return-modal-title" aria-modal="true" aria-hidden="true">
    <div class="modal-backdrop" onclick="window.closeReturnModal && closeReturnModal()"></div>
    <div class="modal-content">
      <button type="button" class="modal-close" onclick="window.closeReturnModal && closeReturnModal()" aria-label="Close">&times;</button>
      <h2 id="return-modal-title" class="modal-title">Complete Your Round Trip</h2>
      <div class="trip-summary">
        <div class="outbound-summary">
          <h3>Outbound</h3>
          <p id="outbound-route"></p>
          <p id="outbound-date"></p>
          <p class="price-large" id="outbound-price"></p>
        </div>
        <div class="trip-arrow">⇄</div>
        <div class="return-summary">
          <h3>Return</h3>
          <p id="return-route"></p>
          <p id="return-selected">Select a return flight below</p>
          <p class="price-large" id="return-price"></p>
        </div>
      </div>
      <div class="return-options-section">
        <h3>Available Return Flights</h3>
        <div id="return-options" class="return-options"></div>
      </div>
      <div class="modal-total">
        <p class="total-label">Total Round Trip</p>
        <p class="total-price" id="modal-total-price">—</p>
        <div class="modal-actions">
          <button type="button" class="btn-primary" id="book-both-btn" disabled>Book Both Flights</button>
          <button type="button" class="btn-secondary" id="book-separate-btn">Book flights separately</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
