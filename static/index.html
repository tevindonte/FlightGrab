<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlightGrab - Find Cheap Flights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/images/logo.png">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo-link">
        <img src="/static/images/logo.png" alt="FlightGrab" class="logo-img">
        <span class="logo-text">FlightGrab</span>
      </a>
      <p class="tagline">Find the cheapest flights today</p>
    </div>
  </header>

  <main class="container">
    <div class="origin-selector">
      <label for="origin">Flying from:</label>
      <select id="origin" aria-label="Origin airport">
        <option value="">Loading...</option>
      </select>
    </div>

    <div class="search-section">
      <input
        type="text"
        id="search-input"
        placeholder="Search airports or cities (e.g., JFK, New York, Atlanta)"
        class="search-input"
        aria-label="Search destinations"
      >
    </div>

    <div id="loading" class="loading hidden">Loading deals...</div>
    <div id="error" class="error hidden"></div>
    <div id="no-results" class="no-results hidden">No results match your search.</div>

    <div id="deals-grid" class="deals-grid"></div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
